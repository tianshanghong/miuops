name: CI — Ansible idempotency

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ansible-dev
  cancel-in-progress: true

# Least privilege: the job only checks out code and SSHes out to the dev server;
# it never uses GITHUB_TOKEN to write back to the repo.
permissions:
  contents: read

jobs:
  ansible:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Lint + CLI unit tests
        run: |
          command -v shellcheck >/dev/null 2>&1 || { sudo apt-get update -qq && sudo apt-get install -y shellcheck >/dev/null; }
          shellcheck -S error miuops
          bash tests/cli_test.sh

      - name: Install Ansible
        run: pip install ansible

      - name: Install Galaxy dependencies
        run: ansible-galaxy collection install -r requirements.yml

      - name: Write SSH key
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Write inventory
        run: |
          cat <<EOF > inventory.ini
          [bare_metal]
          dev ansible_host=${{ secrets.DEV_SERVER_HOST }} ansible_user=${{ secrets.DEV_SERVER_USER }} ansible_ssh_private_key_file=~/.ssh/id_ed25519
          EOF

      - name: Write host_vars
        env:
          GROUP_VARS: ${{ secrets.GROUP_VARS_ALL }}
        run: |
          mkdir -p host_vars
          printf '%s\n' "$GROUP_VARS" > host_vars/dev.yml
          python3 -c "
          import yaml
          with open('host_vars/dev.yml') as f:
              data = yaml.safe_load(f)
          for d in data.get('domains', []):
              print(f'::add-mask::{d}')
          for key in ('tunnel_id',):
              if data.get(key):
                  print(f'::add-mask::{data[key]}')
          "

      - name: Write tunnel credentials
        env:
          TUNNEL_CREDS: ${{ secrets.TUNNEL_CREDENTIALS_JSON }}
        run: |
          mkdir -p files
          printf '%s\n' "$TUNNEL_CREDS" > "files/${{ secrets.TUNNEL_ID }}.json"

      - name: Run playbook (apply)
        run: ansible-playbook playbook.yml

      - name: Run playbook (idempotency check)
        run: |
          output=$(ansible-playbook playbook.yml 2>&1)
          echo "$output"
          changed=$(echo "$output" | grep -oP 'changed=\K[0-9]+' | tail -1)
          if [ "$changed" != "0" ]; then
            echo "::warning::Idempotency check: $changed task(s) reported changed on second run"
          fi

      - name: Verify Docker is active
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 \
            ${{ secrets.DEV_SERVER_USER }}@${{ secrets.DEV_SERVER_HOST }} \
            'systemctl is-active docker'

      - name: Verify cloudflared is active
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 \
            ${{ secrets.DEV_SERVER_USER }}@${{ secrets.DEV_SERVER_HOST }} \
            'systemctl is-active cloudflared'

      - name: Verify host firewall (ufw default-deny inbound; legacy design retired)
        run: |
          SSH="ssh -o StrictHostKeyChecking=no -o ControlMaster=auto -o ControlPath=/tmp/ssh-cm-%C -o ControlPersist=120s -i ~/.ssh/id_ed25519 ${{ secrets.DEV_SERVER_USER }}@${{ secrets.DEV_SERVER_HOST }}"
          $SSH '
            set -e
            ufw status verbose | grep -q "Status: active"            || { echo "FAIL: ufw not active"; exit 1; }
            ufw status verbose | grep -q "deny (incoming)"           || { echo "FAIL: ufw default incoming is not deny"; exit 1; }
            ufw status | grep -qE "^22/tcp[[:space:]]+(ALLOW|LIMIT)" || { ufw status; echo "FAIL: SSH (22) not allowed by ufw"; exit 1; }
            iptables -S FORWARD | grep -q "^-P FORWARD DROP"         || { echo "FAIL: FORWARD policy is not DROP"; exit 1; }
            test ! -e /usr/local/sbin/miuops-firewall.sh             || { echo "FAIL: legacy firewall applier still present"; exit 1; }
            test ! -e /etc/systemd/system/docker.service.d/10-require-firewall.conf || { echo "FAIL: legacy docker drop-in still present"; exit 1; }
            test ! -e /etc/miuops-firewall                           || { echo "FAIL: legacy rules dir still present"; exit 1; }
            echo "ufw active, default-deny inbound, SSH allowed, FORWARD DROP, legacy retired"
          '

      - name: Verify a host inbound port is blocked by ufw (IPv4)
        run: |
          SSH="ssh -o StrictHostKeyChecking=no -o ControlMaster=auto -o ControlPath=/tmp/ssh-cm-%C -o ControlPersist=120s -i ~/.ssh/id_ed25519 ${{ secrets.DEV_SERVER_USER }}@${{ secrets.DEV_SERVER_HOST }}"
          HOST="${{ secrets.DEV_SERVER_HOST }}"; PORT=54321
          cleanup() { $SSH "pkill -f 'http.server ${PORT}' >/dev/null 2>&1 || true"; }
          trap cleanup EXIT
          echo "::group::Start a host listener on 0.0.0.0:${PORT}"
          $SSH "nohup python3 -m http.server ${PORT} --bind 0.0.0.0 >/dev/null 2>&1 & sleep 2; ss -tln | grep -q ':${PORT} ' && echo 'listener up'"
          echo "::endgroup::"
          echo "::group::Positive control — reachable on host loopback"
          code="$($SSH "curl -s -o /dev/null -w '%{http_code}' --max-time 5 http://127.0.0.1:${PORT}/")"
          { [ -n "$code" ] && [ "$code" != "000" ]; } || { echo "FAIL: host listener not actually up"; exit 1; }
          echo "::endgroup::"
          echo "::group::External IPv4 probe from the runner — MUST be blocked by ufw"
          if curl -4 -s -o /dev/null --connect-timeout 8 --max-time 12 "http://${HOST}:${PORT}/"; then
            echo "FAIL: host port ${PORT} reachable from outside — ufw INPUT not denying"; exit 1
          fi
          echo "host inbound port correctly blocked by ufw"
          echo "::endgroup::"

      # In the new model a published port is kept off the public interface by binding it to
      # loopback (the stacks policy), not by a runtime DROP. Prove a 127.0.0.1-bound publish
      # is reachable locally but not from outside.
      - name: Verify a loopback-bound Docker port is not externally reachable (IPv4)
        run: |
          SSH="ssh -o StrictHostKeyChecking=no -o ControlMaster=auto -o ControlPath=/tmp/ssh-cm-%C -o ControlPersist=120s -i ~/.ssh/id_ed25519 ${{ secrets.DEV_SERVER_USER }}@${{ secrets.DEV_SERVER_HOST }}"
          HOST="${{ secrets.DEV_SERVER_HOST }}"; PORT=54322
          cleanup() { $SSH "docker rm -f fw-loopback-test >/dev/null 2>&1 || true"; }
          trap cleanup EXIT
          echo "::group::Publish a container bound to 127.0.0.1:${PORT}"
          $SSH "docker rm -f fw-loopback-test >/dev/null 2>&1; docker run -d --name fw-loopback-test -p 127.0.0.1:${PORT}:${PORT} busybox httpd -f -p ${PORT} -h /tmp >/dev/null && sleep 2 && docker ps --filter name=fw-loopback-test --format 'status: {{.Status}}'"
          echo "::endgroup::"
          echo "::group::Positive control — reachable on loopback"
          code="$($SSH "curl -s -o /dev/null -w '%{http_code}' --max-time 5 http://127.0.0.1:${PORT}/")"
          { [ -n "$code" ] && [ "$code" != "000" ]; } || { echo "FAIL: test container not listening"; exit 1; }
          echo "::endgroup::"
          echo "::group::External IPv4 probe — MUST be blocked (bound to loopback)"
          if curl -4 -s -o /dev/null --connect-timeout 8 --max-time 12 "http://${HOST}:${PORT}/"; then
            echo "FAIL: loopback-bound port ${PORT} reachable externally"; exit 1
          fi
          echo "loopback-bound container correctly not externally reachable"
          echo "::endgroup::"

      # ufw's before6.rules ship the ICMPv6/NDP allows, so default-deny does not break IPv6.
      # GitHub runners have no IPv6 egress, so assert from the host (v6 egress needs NDP).
      - name: Verify IPv6 egress works under ufw (NDP)
        run: |
          SSH="ssh -o StrictHostKeyChecking=no -o ControlMaster=auto -o ControlPath=/tmp/ssh-cm-%C -o ControlPersist=120s -i ~/.ssh/id_ed25519 ${{ secrets.DEV_SERVER_USER }}@${{ secrets.DEV_SERVER_HOST }}"
          if [ -z "$($SSH 'ip -6 -o addr show scope global 2>/dev/null | head -1')" ]; then
            echo "::notice::dev server has no global IPv6 address — skipping v6 egress test"
          elif $SSH "curl -6 -sS -o /dev/null --max-time 12 https://www.google.com"; then
            echo "IPv6 egress works — gateway NDP resolves under ufw"
          else
            echo "---- diagnostics ----"; $SSH "ip -6 route show default; ip -6 neigh show; ufw status verbose" || true
            echo "FAIL: global IPv6 present but no v6 egress under ufw"; exit 1
          fi
