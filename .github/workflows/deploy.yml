name: Deploy fleet stacks

# Reusable workflow that lives in miuops. The operator's private fleet repo adds
# a tiny caller that runs on push to its main branch:
#
#   # .github/workflows/deploy.yml in the FLEET repo
#   name: Deploy fleet
#   on:
#     push:
#       branches: [main]
#     workflow_dispatch:          # manual "redeploy / restart" button (optional)
#       inputs:
#         server:         { type: string,  default: "" }   # blank = whole fleet on dispatch
#         stack:          { type: string,  default: "" }   # blank = all its stacks
#         force_recreate: { type: boolean, default: false }
#   jobs:
#     deploy:
#       # Pin to an immutable ref. This workflow handles per-server SSH keys, so a
#       # mutable ref (a branch) would be a server-takeover supply-chain risk.
#       # A release TAG is the minimum; a full commit SHA is strongest.
#       uses: tianshanghong/miuops/.github/workflows/deploy.yml@v1
#       with:
#         # MUST equal the @ref above. This workflow loads its deploy scripts from
#         # miuops at this ref, so they are the SAME immutable version as the
#         # workflow. (A reusable workflow can't read its own @ref at run time --
#         # github.job_workflow_ref is empty on current runners -- so it's passed.)
#         miuops_ref: v1
#         # Passthrough is inert on push (github.event.inputs.* are null there,
#         # so strings resolve to "" and the boolean to false) and only takes
#         # effect on a manual dispatch:
#         only_server:    ${{ github.event.inputs.server }}
#         only_stack:     ${{ github.event.inputs.stack }}
#         force_recreate: ${{ github.event.inputs.force_recreate == 'true' }}
#       secrets: inherit
#
# Per-server secret isolation: each changed server gets its own matrix job with a
# job-level `environment: <server>`, so it loads ONLY that server's Environment
# secrets (SSH_HOST/SSH_USER/SSH_PORT/SSH_PRIVATE_KEY/SSH_KNOWN_HOSTS). A matrix
# job for one server cannot reference another's secrets -- that is the isolation.
# `on.workflow_call` cannot declare an environment, so the binding is at job level
# (where the matrix context is available). `secrets: inherit` lets this workflow
# reference secrets at all; the `environment:` binding (not inherit) is what
# isolates one server from another. The age/SOPS key + Cloudflare token are never
# GitHub secrets, so inherit cannot leak them.

on:
  workflow_call:
    inputs:
      miuops_ref:
        description: >-
          Ref of the miuops repo to load the deploy scripts from. MUST match the
          @<ref> this workflow is pinned to in the caller, so the scripts are the
          same immutable version as the workflow itself.
        type: string
        required: true
      miuops_repo:
        description: Repository that holds the deploy scripts (override only for a fork).
        type: string
        required: false
        default: tianshanghong/miuops
      stacks_dir:
        description: Path prefix in the fleet repo that holds per-server stacks.
        type: string
        required: false
        default: fleet/stacks
      remote_stacks_dir:
        description: Destination prefix on each server.
        type: string
        required: false
        default: /opt/stacks
      only_server:
        description: >-
          Manual dispatch: deploy ONLY this server, bypassing git-diff discovery.
          Blank (the default, and every push) = normal diff-based discovery.
        type: string
        required: false
        default: ""
      only_stack:
        description: >-
          Manual dispatch: within the targeted server, bring up ONLY this stack
          directory (requires only_server). Blank = every stack on the server.
        type: string
        required: false
        default: ""
      force_recreate:
        description: >-
          Manual dispatch: pass --force-recreate to `docker compose up`, so a
          container is recreated even when its image + config are unchanged
          (re-runs its entrypoint). Blank/false on every push.
        type: boolean
        required: false
        default: false

# Least privilege: read the fleet repo and SSH out. Never write back to the repo.
permissions:
  contents: read

# Serialize deploys of the same fleet ref. Do not cancel in progress: a
# half-finished rsync is worse than a short queue.
concurrency:
  group: fleet-deploy-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Determine which servers changed in this push -> a JSON array for the matrix.
  # Reads no secrets, so a crafted server name has zero secret-exposure surface.
  discover:
    runs-on: ubuntu-latest
    outputs:
      servers: ${{ steps.scan.outputs.servers }}
    steps:
      # Safety rail for the manual dispatch: force_recreate AND only_stack are
      # both targeted ops. Without only_server, discovery falls back to "all
      # present stacks" (a dispatch has no diff base), so either one unguarded
      # would fan across every server at once -- a force_recreate mass-recreate,
      # or an only_stack redeploy + fleet-wide teardown suppression. Require a
      # target server for both. Inert on push (both are empty/false there), so
      # the normal diff-based deploy is unaffected.
      - name: Guard — force_recreate / only_stack require a target server
        if: ${{ (inputs.force_recreate || inputs.only_stack != '') && inputs.only_server == '' }}
        run: |
          echo "::error::force_recreate or only_stack requires 'only_server' (refusing to fan a targeted redeploy across every server)."
          exit 1

      # fetch-depth: 0 -> full history so a before..after diff is correct for any
      # pushed range (the default depth-1 checkout lacks the base commit).
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      # This is a REUSABLE workflow: the checkout above is the CALLER's fleet repo,
      # which has no deploy scripts (they live here, in miuops). Check out miuops at
      # the caller-supplied ref (== the @pin) so the machinery is that exact version.
      # The scripts still operate on the caller's checkout (GITHUB_WORKSPACE).
      - name: Check out miuops machinery (deploy scripts)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ inputs.miuops_repo }}
          ref: ${{ inputs.miuops_ref }}
          path: .miuops-machinery
          persist-credentials: false

      - name: Scan changed servers
        id: scan
        env:
          # github context reflects the caller's push event. before is the
          # all-zero SHA on a first push / new branch; the script handles that
          # and any unknown/rewritten base by deploying all present stacks.
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.sha }}
          STACKS_DIR: ${{ inputs.stacks_dir }}
          # Manual dispatch: when set, the script emits only this server and
          # ignores the diff. Passed via env (never a run: string) and validated
          # against the server-name allowlist inside the script.
          ONLY_SERVER: ${{ inputs.only_server }}
        run: |
          set -euo pipefail
          servers="$(bash "${GITHUB_WORKSPACE}/.miuops-machinery/.github/scripts/discover-changed-servers.sh")"
          printf 'servers=%s\n' "$servers" >> "$GITHUB_OUTPUT"
          printf 'Changed servers: %s\n' "$servers"

  # One isolated runner per changed server.
  deploy:
    needs: discover
    # An empty fromJSON matrix errors. Skip cleanly (green, zero jobs) when no
    # server changed (e.g. a push that only touched inventory/host_vars).
    if: needs.discover.outputs.servers != '[]'
    runs-on: ubuntu-latest
    environment: ${{ matrix.server }}
    concurrency:
      # Never two concurrent deploys to the SAME server; different servers still
      # run in parallel. Do not cancel: let an in-flight deploy finish.
      group: fleet-deploy-${{ github.repository }}-${{ github.ref }}-${{ matrix.server }}
      cancel-in-progress: false
    strategy:
      # One server's failure must not cancel the others.
      fail-fast: false
      # Bound concurrent SSH fan-out across the fleet.
      max-parallel: 4
      matrix:
        server: ${{ fromJSON(needs.discover.outputs.servers) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Same as the discover job: pull the deploy scripts from miuops at the pinned
      # ref (the caller's checkout above has only the fleet's stacks, no scripts).
      - name: Check out miuops machinery (deploy scripts)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ inputs.miuops_repo }}
          ref: ${{ inputs.miuops_ref }}
          path: .miuops-machinery
          persist-credentials: false

      - name: Deploy ${{ matrix.server }}
        env:
          # Resolve from environment: ${{ matrix.server }} -- this one server only.
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
          # Untrusted directory name: only ever passed as an env var / argument,
          # never concatenated into a command. Re-validated inside the script.
          SERVER: ${{ matrix.server }}
          STACKS_DIR: ${{ inputs.stacks_dir }}
          REMOTE_STACKS_DIR: ${{ inputs.remote_stacks_dir }}
          # Manual-dispatch targeting: both empty/false on a normal push. ONLY_STACK
          # is re-validated against the name allowlist in the script; FORCE_RECREATE
          # is constrained to true|false. Passed via env, never a run: string.
          ONLY_STACK: ${{ inputs.only_stack }}
          FORCE_RECREATE: ${{ inputs.force_recreate }}
        run: bash "${GITHUB_WORKSPACE}/.miuops-machinery/.github/scripts/deploy-server.sh"
