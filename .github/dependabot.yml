version: 2
updates:
  # GitHub Actions in the workflows — kept pinned to commit SHAs (version in the
  # trailing comment); Dependabot bumps the SHA + comment on new releases.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci(deps)"

# Not covered by Dependabot (no manager): the Alloy image pin in
# roles/observability/defaults/main.yml and the Ansible Galaxy collections in
# requirements.yml. These are low-churn — bump them manually.
