[defaults]
inventory = inventory.ini
host_key_checking = False

[ssh_connection]
# Reuse one SSH connection per host: faster (fewer connections), and one YubiKey
# touch per session instead of per task. Raise ControlPersist in your own ssh
# config for longer interactive multi-command sessions.
ssh_args = -o ControlMaster=auto -o ControlPath=/tmp/ansible-ssh-%C -o ControlPersist=60s 