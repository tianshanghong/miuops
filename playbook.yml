---
- name: Bootstrap server with Docker + Traefik + Cloudflare Tunnel
  hosts: bare_metal
  become: true
  
  pre_tasks:
    - name: Update apt package cache
      apt:
        update_cache: yes
        cache_valid_time: 3600
      
    - name: Upgrade all packages to latest version
      apt:
        upgrade: full
        update_cache: yes
        autoremove: yes
        
    - name: Gather service facts
      service_facts:
    
    - name: Check for required variables
      fail:
        msg: "Please configure at least one domain in host_vars/<host>.yml"
      when: domains | default([], true) | length == 0 or domains[0] == ""
    
    - name: Check for Tunnel ID
      pause:
        prompt: "Enter your Cloudflare Tunnel UUID"
      register: tunnel_id_prompt
      when: tunnel_id is not defined or tunnel_id == ""
    
    - name: Set Tunnel ID
      set_fact:
        tunnel_id: "{{ tunnel_id_prompt.user_input }}"
      when: (tunnel_id is not defined or tunnel_id == "") and tunnel_id_prompt.user_input is defined

  roles:
    - role: firewall
      tags: ['firewall']
    - role: ssh
      tags: ['ssh']
    - role: docker
      tags: ['docker']
    - role: metadata-block
      tags: ['metadata-block']
    - role: traefik
      tags: ['traefik']
    - role: cloudflared
      tags: ['cloudflared']
    - role: observability
      tags: ['observability']
    - role: backup
      tags: ['backup']
    - role: unattended-upgrades
      tags: ['unattended-upgrades']
