---
# Firewall role — host inbound default-deny via ufw.
#
# Owns ONLY the host INPUT edge: zero open inbound ports except SSH (+ optional management
# networks / whitelist). Docker manages its own FORWARD/NAT chains and is not touched; the
# FORWARD policy is left at DROP (Docker re-adds its own FORWARD ACCEPTs, so container
# forwarding keeps working). Container published ports are kept off the public interface by
# the stacks policy (127.0.0.1 binds + the CI policy-check), not by this firewall.

- name: Install ufw
  ansible.builtin.apt:
    name: ufw
    state: present
  become: true

- name: Set ufw FORWARD policy DROP + enable IPv6
  # Leave the FORWARD default at DROP (the secure value) — do NOT weaken it to ACCEPT.
  # Docker inserts its own explicit FORWARD ACCEPT rules at the top of the chain and re-sets
  # the FORWARD policy to DROP itself, so container forwarding/egress works before the
  # default policy is reached (verified on-host). The DROP fallback then drops any forwarded
  # packet that neither Docker nor ufw explicitly allows.
  ansible.builtin.lineinfile:
    path: /etc/default/ufw
    regexp: "{{ item.re }}"
    line: "{{ item.line }}"
  loop:
    - { re: '^DEFAULT_FORWARD_POLICY=', line: 'DEFAULT_FORWARD_POLICY="DROP"' }
    - { re: '^IPV6=', line: 'IPV6=yes' }
  register: fw_defaults
  become: true

- name: ufw default policies (deny inbound, allow outbound)
  community.general.ufw:
    direction: "{{ item.direction }}"
    policy: "{{ item.policy }}"
  loop:
    - { direction: incoming, policy: deny }
    - { direction: outgoing, policy: allow }
  become: true

- name: Allow management networks (these bypass the SSH rate-limit)
  community.general.ufw:
    rule: allow
    from_ip: "{{ item }}"
  loop: "{{ (firewall_management_networks_v4 | default([])) + (firewall_management_networks_v6 | default([])) }}"
  become: true

- name: Allow SSH (rate-limited unless disabled)
  community.general.ufw:
    rule: "{{ 'limit' if (firewall_ssh_ratelimit_enabled | bool) else 'allow' }}"
    port: "{{ ssh_port }}"
    proto: tcp
  become: true

- name: Allow whitelisted inbound ports
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop: "{{ (firewall_whitelist_ports_v4 | default([])) + (firewall_whitelist_ports_v6 | default([])) }}"
  become: true

- name: Enable ufw with logging (LAST — all allow rules are in place, so no lockout)
  community.general.ufw:
    state: enabled
    logging: "on"
  register: fw_ufw_enable
  become: true

- name: Reload ufw when /etc/default/ufw changed on an already-enabled host
  # `ufw enable` reads /etc/default/ufw, so a first enable already applies the FORWARD/IPv6
  # settings. Only an already-enabled host (enable is a no-op) needs an explicit reload when
  # those defaults change. Inline (not a deferred handler) so the Docker rebuild below runs
  # AFTER the last ufw filter-table mutation.
  community.general.ufw:
    state: reloaded
  when: fw_defaults is changed and fw_ufw_enable is not changed
  become: true

- name: Check whether Docker is running
  ansible.builtin.command: systemctl is-active docker
  register: fw_docker_active
  changed_when: false
  failed_when: false
  become: true

- name: Restart Docker to rebuild its chains after a ufw enable/reload
  # `ufw enable`/`ufw reload` resets the filter table. On a fresh host this role runs before
  # Docker is installed, so there is nothing to rebuild (skipped). It fires only when ufw
  # actually changed AND Docker is already running — a re-converge that changed the ufw
  # config — so Docker rebuilds its chains after the table reset.
  ansible.builtin.systemd:
    name: docker
    state: restarted
  when: (fw_ufw_enable is changed or fw_defaults is changed) and fw_docker_active.stdout == "active"
  become: true
