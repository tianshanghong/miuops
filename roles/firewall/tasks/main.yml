---
# Firewall role — host inbound default-deny via ufw.
#
# Owns ONLY the host INPUT edge: zero open inbound ports except SSH (+ optional
# management networks / whitelist). Docker owns its own FORWARD/DOCKER-* chains and is
# NOT touched (ufw's FORWARD policy is left ACCEPT so container forwarding keeps working).
# Container published ports are kept off the public interface by the stacks policy
# (127.0.0.1 binds + the CI policy-check), NOT by this firewall.
#
# Replaces the previous DOCKER-USER iptables-coexistence design (retired below).

# ---- Retire the legacy DOCKER-USER firewall (drop-in FIRST, see note) ----------------
- name: Remove legacy docker.service firewall drop-in
  # Remove this FIRST: it made docker Require the host firewall unit, so removing the unit
  # while the drop-in remains would stop Docker from starting.
  ansible.builtin.file:
    path: /etc/systemd/system/docker.service.d/10-require-firewall.conf
    state: absent
  become: true
  notify: Reload systemd

- name: Stop + disable legacy miuops-firewall units
  ansible.builtin.command: "systemctl disable --now {{ item }}"
  failed_when: false
  changed_when: false
  loop:
    - miuops-firewall-host.service
    - miuops-firewall-docker-user.service
    - miuops-firewall-docker-user.timer
  become: true

- name: Remove legacy miuops-firewall unit files + applier + rules dir
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/systemd/system/miuops-firewall-host.service
    - /etc/systemd/system/miuops-firewall-docker-user.service
    - /etc/systemd/system/miuops-firewall-docker-user.timer
    - /usr/local/sbin/miuops-firewall.sh
    - /etc/miuops-firewall
  become: true
  notify: Reload systemd

# ---- Host inbound firewall via ufw ---------------------------------------------------
- name: Install ufw
  ansible.builtin.apt:
    name: ufw
    state: present
  become: true

- name: ufw FORWARD policy DROP + enable IPv6
  # Leave the FORWARD default at DROP (the secure value) — do NOT weaken it to ACCEPT.
  # Docker creates its own explicit FORWARD jumps (DOCKER-USER, DOCKER-FORWARD) at the TOP
  # of FORWARD and re-sets the FORWARD policy to DROP itself, so container forwarding/egress
  # is ACCEPTed by Docker's own rules before the default policy is ever reached (verified
  # on-host: containers egress fine with policy DROP). The DROP fallback then still drops
  # any forwarded packet that neither Docker nor ufw explicitly allows.
  ansible.builtin.lineinfile:
    path: /etc/default/ufw
    regexp: "{{ item.re }}"
    line: "{{ item.line }}"
  loop:
    - { re: '^DEFAULT_FORWARD_POLICY=', line: 'DEFAULT_FORWARD_POLICY="DROP"' }
    - { re: '^IPV6=', line: 'IPV6=yes' }
  become: true
  notify: Reload ufw

- name: ufw default policies (deny inbound, allow outbound)
  community.general.ufw:
    direction: "{{ item.direction }}"
    policy: "{{ item.policy }}"
  loop:
    - { direction: incoming, policy: deny }
    - { direction: outgoing, policy: allow }
  become: true

- name: Allow management networks (these bypass the SSH rate-limit)
  community.general.ufw:
    rule: allow
    from_ip: "{{ item }}"
  loop: "{{ (firewall_management_networks_v4 | default([])) + (firewall_management_networks_v6 | default([])) }}"
  become: true

- name: Allow SSH (rate-limited unless disabled)
  community.general.ufw:
    rule: "{{ 'limit' if (firewall_ssh_ratelimit_enabled | bool) else 'allow' }}"
    port: "{{ ssh_port }}"
    proto: tcp
  become: true

- name: Allow whitelisted inbound ports
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop: "{{ (firewall_whitelist_ports_v4 | default([])) + (firewall_whitelist_ports_v6 | default([])) }}"
  become: true

- name: Enable ufw with logging (LAST — all allow rules are in place, so no lockout)
  community.general.ufw:
    state: enabled
    logging: "on"
  register: fw_ufw_enable
  become: true

# ---- Rebuild Docker chains if `ufw enable` flushed them (existing hosts only) ---------
- name: Check whether Docker is running
  ansible.builtin.command: systemctl is-active docker
  register: fw_docker_active
  changed_when: false
  failed_when: false
  become: true

- name: Restart Docker to rebuild its chains after a ufw (re)enable
  # `ufw enable` resets the filter table; an already-running Docker loses its chains. On a
  # fresh host Docker starts AFTER this role (nothing to rebuild → skipped). Only fires
  # when ufw actually changed AND Docker is already up.
  ansible.builtin.systemd:
    name: docker
    state: restarted
  when: fw_ufw_enable is changed and fw_docker_active.stdout == "active"
  become: true
