---
# Main tasks for firewall role - nft backend only version with atomic rule loading

# ========== Packages & binary links ==========================================
- name: Install nft backend (provided by iptables) and persistence tools
  apt:
    name:
      - iptables            # Available in Ubuntu 20.04/22.04/24.04
      - iptables-persistent # Provides netfilter-persistent service
    state: present
  become: true

# ========== Force nft backend usage ==========================================
# 1. Set nft as the default backend for iptables and ip6tables. The alternatives
#    module is idempotent: it only invokes update-alternatives when the current
#    selection differs, so it does not rewrite the *-restore slave links on
#    no-op runs (which previously made the fallback link task flip every run).
- name: Select nft backend (IPv4/IPv6)
  community.general.alternatives:
    name: "{{ item.name }}"
    path: "{{ item.path }}"
  loop:
    - { name: iptables,  path: /usr/sbin/iptables-nft }
    - { name: ip6tables, path: /usr/sbin/ip6tables-nft }
  become: true

# 2. Ensure the *-restore links resolve to the nft backend (fallback for
#    systems where the alternative does not provide the restore slave link)
- name: Ensure generic restore links exist (fallback)
  file:
    src: "/usr/sbin/{{ item }}-nft-restore"
    dest: "/usr/sbin/{{ item }}-restore"
    state: link
    force: yes
  loop:
    - iptables
    - ip6tables
  become: true

# ========== Rules directory setup ============================================
- name: Create rules directory
  file:
    path: /etc/iptables
    state: directory
    mode: '0755'
  become: true

# ========== Rule loading (idempotent) =======================================
# Render straight to the persistent file. `validate` syntax-checks the rendered
# ruleset (iptables-restore --test) on a temp copy before it is atomically moved
# into place, so a broken ruleset is never written. The rules are only reloaded
# into the running kernel when the file content actually changes (see handler).
- name: Render IPv4 rules
  template:
    src: rules.v4.j2
    dest: /etc/iptables/rules.v4
    mode: '0600'
    validate: iptables-restore --test %s
  become: true
  notify: Reload IPv4 rules

- name: Render IPv6 rules
  template:
    src: rules.v6.j2
    dest: /etc/iptables/rules.v6
    mode: '0600'
    validate: ip6tables-restore --test %s
  become: true
  notify: Reload IPv6 rules

# ========== systemd override ================================================
- name: Create netfilter-persistent override dir
  file:
    path: /etc/systemd/system/netfilter-persistent.service.d
    state: directory
    mode: '0755'
  become: true

- name: Make netfilter-persistent start before Docker
  copy:
    dest: /etc/systemd/system/netfilter-persistent.service.d/override.conf
    mode: '0644'
    content: |
      [Unit]
      Before=docker.service
      After=network-pre.target
      Requires=

      [Service]
      ExecStartPre=/bin/sleep 2
  register: override_file
  become: true

- name: Reload systemd if override changed
  systemd:
    daemon_reload: yes
  when: override_file is changed
  become: true

- name: Enable + start netfilter-persistent
  systemd:
    name: netfilter-persistent
    enabled: yes
    state: started
  become: true

# Handlers
- name: Flush handlers
  meta: flush_handlers