---
# Firewall role — host-owned chains only (INPUT + DOCKER-USER + FORWARD policy),
# never flushing Docker's chains. See docs/superpowers/specs/2026-06-23-firewall-*.

# ========== Packages & nft backend ==========================================
- name: Install iptables, nftables and persistence tooling
  apt:
    name: [iptables, nftables, iptables-persistent]
    state: present
  become: true

- name: Select nft backend (IPv4/IPv6)
  community.general.alternatives:
    name: "{{ item.name }}"
    path: "{{ item.path }}"
  loop:
    - { name: iptables,  path: /usr/sbin/iptables-nft }
    - { name: ip6tables, path: /usr/sbin/ip6tables-nft }
  become: true

- name: Ensure generic restore links exist (fallback)
  file:
    src: "/usr/sbin/{{ item }}-nft-restore"
    dest: "/usr/sbin/{{ item }}-restore"
    state: link
    force: yes
  loop: [iptables, ip6tables]
  become: true

# ========== Rendered rule artifacts =========================================
- name: Create miuops-firewall rules directory
  file:
    path: /etc/miuops-firewall
    state: directory
    mode: '0755'
  become: true

- name: Render INPUT (v4) ruleset
  template:
    src: host.v4.rules.j2
    dest: /etc/miuops-firewall/host.v4.rules
    mode: '0600'
    validate: iptables-restore --test --noflush %s
  become: true
  notify: Apply host firewall

- name: Render INPUT (v6) ruleset
  template:
    src: host.v6.rules.j2
    dest: /etc/miuops-firewall/host.v6.rules
    mode: '0600'
    validate: ip6tables-restore --test --noflush %s
  become: true
  notify: Apply host firewall

- name: Render DOCKER-USER ruleset
  template:
    src: docker-user.rules.j2
    dest: /etc/miuops-firewall/docker-user.rules
    mode: '0600'
    # No render-time validate: on a fresh host the DOCKER-USER chain doesn't exist
    # yet (this role runs before docker). The applier validates the SAME file with
    # `iptables-restore --test` at apply time, after `-N DOCKER-USER` — validated==applied.
  become: true
  notify: Apply docker-user firewall

- name: Install the applier
  template:
    src: miuops-firewall.sh.j2
    dest: /usr/local/sbin/miuops-firewall.sh
    mode: '0755'
  become: true
  notify:
    - Apply host firewall
    - Apply docker-user firewall

# ========== systemd units ===================================================
- name: Install systemd units
  template:
    src: "{{ item }}.j2"
    dest: "/etc/systemd/system/{{ item }}"
    mode: '0644'
  loop:
    - miuops-firewall-host.service
    - miuops-firewall-docker-user.service
    - miuops-firewall-docker-user.timer
  become: true
  notify: Reload systemd

- name: Reload systemd now (so enable/start below see the units)
  meta: flush_handlers

- name: Enable + start host firewall unit (BEFORE masking netfilter-persistent)
  systemd:
    name: miuops-firewall-host.service
    enabled: yes
    state: started
  become: true

- name: Enable docker-user unit + reconcile timer
  systemd:
    name: "{{ item }}"
    enabled: yes
  loop:
    - miuops-firewall-docker-user.service
    - miuops-firewall-docker-user.timer
  become: true

- name: Start reconcile timer
  systemd:
    name: miuops-firewall-docker-user.timer
    state: started
  become: true

# ========== Neutralise the old whole-table-flush mechanism ==================
- name: Mask netfilter-persistent (its restore flushes the whole filter table)
  systemd:
    name: netfilter-persistent.service
    masked: yes
    enabled: no
  become: true

- name: Assert netfilter-persistent is masked
  command: systemctl is-enabled netfilter-persistent.service
  register: nfp_state
  changed_when: false
  failed_when: nfp_state.stdout != "masked"
  become: true

- name: Remove stale full-table persisted rulesets
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/iptables/rules.v4
    - /etc/iptables/rules.v6
  become: true

- name: Remove the legacy netfilter-persistent before-docker override
  # Masking neutralises the service, but drop its old override dir too so an
  # accidental future unmask can't revive the whole-table-flush-before-docker behavior.
  file:
    path: /etc/systemd/system/netfilter-persistent.service.d
    state: absent
  become: true
  notify: Reload systemd

- name: Flush handlers
  meta: flush_handlers
