---
# Default variables for firewall role

# IPv4 Management network segments to allow, empty list means no management networks
firewall_management_networks_v4: []
  # - 10.0.0.0/8
  # - 192.168.0.0/16

# IPv6 Management network segments to allow, empty list means no management networks
firewall_management_networks_v6: []
  # - fe80::/10

# IPv4 ports to allow (SSH port is handled separately)
firewall_whitelist_ports_v4: []
  # - 80
  # - 443

# IPv6 ports to allow (SSH port is handled separately)
firewall_whitelist_ports_v6: []
  # - 80
  # - 443

# SSH port the firewall rules open / rate-limit (was previously set in a playbook
# pre_task). Override per server in host_vars if SSH runs on a non-default port.
ssh_port: "22"

# SSH brute-force protection. Default on (the only protection for users without a
# fixed source IP). Management networks (firewall_management_networks_*) are
# allowed before this rule, so they bypass it; an operator who allowlists may also
# set firewall_ssh_ratelimit_enabled: false. The default 10 new conns / 60s is
# forgiving for scp/rsync/CI bursts while still throttling brute force.
firewall_ssh_ratelimit_enabled: true
firewall_ssh_ratelimit_hits: 10
firewall_ssh_ratelimit_seconds: 60
