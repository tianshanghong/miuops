---
# Default variables for the firewall role (ufw-based host inbound firewall).

# IPv4/IPv6 management network segments allowed inbound (e.g. an office or VPN range).
# Empty = none. These bypass the SSH rate-limit.
firewall_management_networks_v4: []
  # - 10.0.0.0/8
firewall_management_networks_v6: []
  # - 2001:db8::/32

# Extra inbound ports to allow besides SSH (rare — container published ports are bound to
# loopback by the stacks policy, not opened here). `ufw allow <port>` covers both families.
firewall_whitelist_ports_v4: []
  # - 80
firewall_whitelist_ports_v6: []

# SSH port to allow / rate-limit. Override per host if SSH runs on a non-default port.
ssh_port: "22"

# Rate-limit new SSH connections via `ufw limit` (blocks a source after ~6 connections in
# 30s — brute-force protection for operators without a fixed source IP). Set false to
# plain-allow (e.g. when management networks already restrict access). The 6/30s threshold
# is ufw's built-in and is not separately tunable.
firewall_ssh_ratelimit_enabled: true
