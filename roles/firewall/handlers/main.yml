---
# Handlers for firewall role. Re-run the appliers when rules/units change.
# DOCKER-USER apply tolerates "docker not yet installed" on first bootstrap
# (the playbook post_task applies it once Docker is up).

- name: Reload systemd
  systemd:
    daemon_reload: yes
  become: true

- name: Apply host firewall
  command: /usr/local/sbin/miuops-firewall.sh host
  become: true

- name: Apply docker-user firewall
  command: /usr/local/sbin/miuops-firewall.sh docker-user
  become: true
  when:
    - ansible_facts.services is defined
    - "'docker.service' in ansible_facts.services"
    - ansible_facts.services['docker.service'].state == 'running'
