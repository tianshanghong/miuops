---
# Handlers for firewall role

# Apply the rendered rules to the running kernel. Only triggered when the
# corresponding rules file changed, so an unchanged run reloads nothing and
# does not restart Docker.
- name: Reload IPv4 rules
  command: iptables-restore /etc/iptables/rules.v4
  become: true
  notify: Restart Docker service

- name: Reload IPv6 rules
  command: ip6tables-restore /etc/iptables/rules.v6
  become: true
  notify: Restart Docker service

# If docker service is installed, we will restart it when the rules change.
# If it is not installed, the docker role will install it and start it later.
- name: Restart Docker service
  systemd:
    name: docker
    state: restarted
  become: true
  when:
    - ansible_facts.services is defined
    - "'docker.service' in ansible_facts.services"
    - ansible_facts.services['docker.service'].state == 'running'
