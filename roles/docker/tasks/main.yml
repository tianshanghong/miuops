---
# Install Docker & Docker Compose on Debian/Ubuntu Linux

- name: Install prerequisites
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - python3-debian  # required by the deb822_repository module
    state: present
    update_cache: yes
  tags: ['docker']

- name: Create keyrings directory
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'
  tags: ['docker']

- name: Add Docker GPG key
  get_url:
    url: "{{ docker_gpg_key_url }}"
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'
  tags: ['docker']

- name: Remove legacy Docker .list repo (migrated to deb822 .sources)
  find:
    paths: /etc/apt/sources.list.d
    patterns: '*.list'
    contains: 'download\.docker\.com'
  register: docker_legacy_list
  tags: ['docker']

- name: Delete legacy Docker .list repo files
  file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ docker_legacy_list.files }}"
  loop_control:
    label: "{{ item.path }}"
  tags: ['docker']

- name: Add Docker repository
  deb822_repository:
    name: docker
    types: deb
    uris: "https://download.docker.com/linux/{{ 'debian' if ansible_facts['distribution'] == 'Debian' else 'ubuntu' }}"
    suites: "{{ ansible_facts['distribution_release'] }}"
    components: stable
    architectures: "{{ ansible_facts['architecture'] | replace('x86_64', 'amd64') | replace('aarch64', 'arm64') }}"
    signed_by: /etc/apt/keyrings/docker.asc
    state: present
  tags: ['docker']

- name: Install Docker & Compose plugin
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: yes
  tags: ['docker']

- name: Create Docker user group
  group:
    name: docker
    state: present
  tags: ['docker']

- name: Add the current user to the Docker group
  user:
    name: "{{ ansible_user }}"
    groups: docker
    append: yes
  tags: ['docker']

- name: Create Docker daemon configuration directory
  file:
    path: /etc/docker
    state: directory
    mode: '0755'
  tags: ['docker']

- name: Configure Docker daemon with security enhancements
  copy:
    content: |
      {
        "icc": false,
        "userland-proxy": false,
        "no-new-privileges": true,
        "live-restore": true,
        "log-driver": "json-file",
        "log-opts": { "max-size": "10m", "max-file": "3" },
        "default-ulimits": { "nofile": { "Name": "nofile", "Soft": 65536, "Hard": 65536 } }
      }
    dest: /etc/docker/daemon.json
    mode: '0644'
  notify: Restart Docker
  tags: ['docker']

- name: Ensure Docker is enabled and started
  systemd:
    name: docker
    state: started
    enabled: yes
  tags: ['docker']

- name: Install QEMU user-mode emulation for cross-architecture containers
  apt:
    # Ubuntu 25.04+ makes qemu-user-static a virtual package with multiple providers
    # (apt can't install it directly); use the concrete qemu-user-binfmt package instead.
    name: "{{ 'qemu-user-binfmt' if ansible_facts['distribution_version'] is version('25.04', '>=') else 'qemu-user-static' }}"
    state: present
  tags: ['docker']
