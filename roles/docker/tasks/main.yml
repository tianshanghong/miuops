---
# Install Docker & Docker Compose on Debian/Ubuntu Linux

- name: Install prerequisites
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - python3-debian  # required by the deb822_repository module
    state: present
    update_cache: yes
  tags: ['docker']

- name: Create keyrings directory
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'
  tags: ['docker']

- name: Add Docker GPG key
  get_url:
    url: "{{ docker_gpg_key_url }}"
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'
  tags: ['docker']

- name: Remove legacy Docker .list repo (migrated to deb822 .sources)
  find:
    paths: /etc/apt/sources.list.d
    patterns: '*.list'
    contains: 'download\.docker\.com'
  register: docker_legacy_list
  tags: ['docker']

- name: Delete legacy Docker .list repo files
  file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ docker_legacy_list.files }}"
  loop_control:
    label: "{{ item.path }}"
  tags: ['docker']

- name: Add Docker repository
  deb822_repository:
    name: docker
    types: deb
    uris: "https://download.docker.com/linux/{{ 'debian' if ansible_facts['distribution'] == 'Debian' else 'ubuntu' }}"
    suites: "{{ ansible_facts['distribution_release'] }}"
    components: stable
    architectures: "{{ ansible_facts['architecture'] | replace('x86_64', 'amd64') | replace('aarch64', 'arm64') }}"
    signed_by: /etc/apt/keyrings/docker.asc
    state: present
  tags: ['docker']

- name: Install Docker & Compose plugin
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: yes
  tags: ['docker']

- name: Create Docker user group
  group:
    name: docker
    state: present
  tags: ['docker']

- name: Add the current user to the Docker group
  user:
    name: "{{ ansible_user }}"
    groups: docker
    append: yes
  tags: ['docker']

- name: Create Docker daemon configuration directory
  file:
    path: /etc/docker
    state: directory
    mode: '0755'
  tags: ['docker']

- name: Configure Docker daemon with security enhancements
  copy:
    content: |
      {
        "ip": "127.0.0.1",
        "icc": false,
        "userland-proxy": false,
        "no-new-privileges": true,
        "userns-remap": "default",
        "live-restore": true,
        "log-driver": "json-file",
        "log-opts": { "max-size": "10m", "max-file": "3" },
        "default-ulimits": { "nofile": { "Name": "nofile", "Soft": 65536, "Hard": 65536 } }
      }
    dest: /etc/docker/daemon.json
    mode: '0644'
  notify: Restart Docker
  tags: ['docker']

- name: Assert the Docker API is not exposed over TCP (unix socket only)
  # The Docker API over TCP = unauthenticated root on the host. Check every path it can be
  # enabled on, not just daemon.json: the systemd unit/socket (-H/--host tcp, or a TCP
  # ListenStream incl. a bare port = all interfaces) and any non-loopback listener on the API
  # ports (2375/2376). Fails loud if `ss` is unavailable rather than silently passing. miuops only
  # ever uses the unix socket. (Runs as root — the play sets become.)
  shell: |
    set -e
    if [ -f /etc/docker/daemon.json ] && grep -q 'tcp://' /etc/docker/daemon.json; then
      echo "FAIL: tcp:// configured in /etc/docker/daemon.json"; exit 1
    fi
    units=$(systemctl cat docker.service docker.socket 2>/dev/null) || true
    if printf '%s\n' "$units" | grep -Eq -- '(-H|--host)[ =]*tcp|ListenStream=[[:space:]]*([^/]*:)?(2375|2376)([[:space:]]|$)|ListenStream=.*0\.0\.0\.0'; then
      echo "FAIL: docker systemd unit/socket exposes the API over TCP"; exit 1
    fi
    listeners=$(ss -H -tln 2>/dev/null) || { echo "FAIL: ss unavailable; cannot verify the Docker API is not on TCP"; exit 1; }
    # Only a non-loopback bind on 2375/2376 is the API-over-TCP risk. A loopback-only
    # read-only docker-socket-proxy (127.0.0.1:2375, used by the traefik role) is allowed: the
    # daemon.json/unit checks above already prove the daemon itself is not on TCP, and no
    # container or off-host packet can reach the host loopback.
    exposed=$(printf '%s\n' "$listeners" | grep -E -- ':(2375|2376)([[:space:]]|$)' | grep -vE -- '(^|[[:space:]])(127\.[0-9.]+|\[::1\]):(2375|2376)([[:space:]]|$)') || true
    if [ -n "$exposed" ]; then
      echo "FAIL: a process exposes a Docker API TCP port on a non-loopback address: $exposed"; exit 1
    fi
  changed_when: false
  tags: ['docker']

- name: Ensure Docker is enabled and started
  systemd:
    name: docker
    state: started
    enabled: yes
  tags: ['docker']

- name: Install QEMU user-mode emulation for cross-architecture containers
  apt:
    # Ubuntu 25.04+ makes qemu-user-static a virtual package with multiple providers
    # (apt can't install it directly); use the concrete qemu-user-binfmt package instead.
    name: "{{ 'qemu-user-binfmt' if ansible_facts['distribution_version'] is version('25.04', '>=') else 'qemu-user-static' }}"
    state: present
  tags: ['docker']
