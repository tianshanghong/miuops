---
# Install cloudflared, deploy tunnel credentials and config
# DNS CNAME records are created by the miuops CLI via Cloudflare API

- name: Create cloudflared directory
  file:
    path: "{{ cloudflared_dir }}"
    state: directory
    mode: '0755'
  tags: ['cloudflared']

- name: Add Cloudflare GPG key
  get_url:
    url: "{{ cloudflared_gpg_key_url }}"
    dest: /etc/apt/keyrings/cloudflare-main.gpg
    mode: '0644'
  tags: ['cloudflared']

- name: Install python3-debian (required by the deb822_repository module)
  apt:
    name: python3-debian
    state: present
    update_cache: yes
  tags: ['cloudflared']

- name: Remove legacy Cloudflare .list repo (migrated to deb822 .sources)
  find:
    paths: /etc/apt/sources.list.d
    patterns: '*.list'
    contains: 'pkg\.cloudflare\.com'
  register: cloudflared_legacy_list
  tags: ['cloudflared']

- name: Delete legacy Cloudflare .list repo files
  file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ cloudflared_legacy_list.files }}"
  loop_control:
    label: "{{ item.path }}"
  tags: ['cloudflared']

- name: Add Cloudflare apt repository
  deb822_repository:
    name: cloudflared
    types: deb
    uris: https://pkg.cloudflare.com/cloudflared
    suites: "{{ cloudflared_apt_release }}"
    components: main
    architectures: "{{ ansible_facts['architecture'] | replace('x86_64', 'amd64') | replace('aarch64', 'arm64') }}"
    signed_by: /etc/apt/keyrings/cloudflare-main.gpg
    state: present
  tags: ['cloudflared']

- name: Install cloudflared
  apt:
    name: cloudflared
    state: latest
    update_cache: yes
  notify: Restart cloudflared
  tags: ['cloudflared']

- name: Check if credentials file exists
  stat:
    path: "{{ credentials_file }}"
  register: cf_credentials
  tags: ['cloudflared']

- name: Check for the local tunnel credentials file
  stat:
    path: "{{ playbook_dir }}/files/{{ tunnel_id }}.json"
  delegate_to: localhost
  become: false
  register: cf_local_credentials
  tags: ['cloudflared']

- name: Require tunnel credentials (on the server or in files/)
  assert:
    that: cf_credentials.stat.exists or cf_local_credentials.stat.exists
    fail_msg: >-
      No tunnel credentials for {{ tunnel_id }}: not on the server at
      {{ credentials_file }} and not in files/{{ tunnel_id }}.json. Create the
      tunnel and place its JSON in files/ (see docs/INSTALLATION.md), then re-run.
    quiet: true
  tags: ['cloudflared']

- name: Copy tunnel credentials to the server
  copy:
    src: "files/{{ tunnel_id }}.json"
    dest: "{{ credentials_file }}"
    mode: '0600'
  no_log: true
  when: not cf_credentials.stat.exists
  tags: ['cloudflared']

- name: Deploy cloudflared config
  template:
    src: config.yml.j2
    dest: "{{ cloudflared_dir }}/config.yml"
    mode: '0644'
  notify: Restart cloudflared
  tags: ['cloudflared']

- name: Create systemd service for cloudflared
  template:
    src: cloudflared.service.j2
    dest: /etc/systemd/system/cloudflared.service
    mode: '0644'
  notify:
    - Reload systemd
    - Restart cloudflared
  tags: ['cloudflared']

- name: Enable and start cloudflared service
  systemd:
    name: cloudflared
    enabled: yes
    state: started
  tags: ['cloudflared']

- name: Flush handlers
  meta: flush_handlers
