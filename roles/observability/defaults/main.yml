---
# Grafana Alloy agent shipping metrics + logs to Grafana Cloud. ON by default so a
# server is never silently unmonitored. It ACTIVATES only once the Grafana Cloud push
# endpoint is configured; enabled-but-unconfigured skips with a warning rather than
# failing the converge (so a default-on fleet that hasn't set up Grafana still
# converges). Set `observability_enabled: false` in a host's host_vars to opt out.
observability_enabled: true
# Derived gate: the role's tasks + its config assert run only when ACTIVE. A partial
# config (endpoint set but token/other endpoints missing) still fails that assert.
observability_active: "{{ observability_enabled | bool and (grafana_cloud_prometheus_url | length > 0) }}"

# Pin the Alloy apt package version (supply chain). List available versions with
# `apt-cache madison alloy` (Grafana apt repo). Must be >= 1.14: that release bundles the
# cAdvisor v0.54.x fork which reads per-container metrics through containerd. Docker 29
# switched the default storage driver to overlayfs and dropped the image/<driver>/layerdb/
# mounts layout the old cAdvisor relied on; older Alloy fails container registration
# ("failed to identify the read-write layer ID") and silently ships zero per-container metrics.
observability_alloy_version: "1.17.0-1"

observability_scrape_interval: "60s"

# cloudflared exposes Prometheus metrics here (roles/cloudflared config.yml: metrics: 127.0.0.1:2000).
# Set to "" to skip scraping it.
observability_cloudflared_metrics: "127.0.0.1:2000"

# --- Grafana Cloud connection — config/secret split ---
# The push URLs + numeric user IDs are NOT secret and are identical across the fleet,
# so they are versioned CONFIG: set them once in fleet/group_vars/all.yml (see
# group_vars/all.yml.example). These defaults are empty; the role asserts they are
# non-empty, so a missing one fails the converge LOUD rather than silently shipping an
# empty endpoint. They never touch the environment.
grafana_cloud_prometheus_url:  ""
grafana_cloud_prometheus_user: ""
grafana_cloud_loki_url:        ""
grafana_cloud_loki_user:       ""
# The TOKEN is the one SECRET here. It bridges via the environment for now (export
# GRAFANA_CLOUD_TOKEN; scope the Access Policy to metrics:write + logs:write); the
# SOPS-in-fleet migration decrypts it at converge and supplies it as an extra-var.
grafana_cloud_token:           "{{ lookup('env', 'GRAFANA_CLOUD_TOKEN') | default('', true) }}"
