---
# Grafana Alloy agent shipping metrics + logs to Grafana Cloud. Opt-in per host:
# set `observability_enabled: true` in that host's host_vars.
observability_enabled: false

# Pin the Alloy image (supply chain). Verify/bump at hub.docker.com/r/grafana/alloy/tags
# Must be >= v1.14.0: that release bundles the cAdvisor v0.54.x fork which reads
# per-container metrics through containerd. Docker 29 switched the default storage
# driver to overlayfs and dropped the image/<driver>/layerdb/mounts layout the old
# cAdvisor relied on; older Alloy fails container registration ("failed to identify
# the read-write layer ID") and silently ships zero per-container metrics.
observability_alloy_image: "grafana/alloy:v1.17.0"

observability_scrape_interval: "60s"

# cloudflared exposes Prometheus metrics here (roles/cloudflared config.yml: metrics: 127.0.0.1:2000).
# Set to "" to skip scraping it.
observability_cloudflared_metrics: "127.0.0.1:2000"

# --- Grafana Cloud connection (supplied via environment variables at apply time) ---
# Nothing is stored on disk by default. Export these before running, e.g.:
#   export GRAFANA_CLOUD_PROM_URL=...  GRAFANA_CLOUD_PROM_USER=... \
#          GRAFANA_CLOUD_LOKI_URL=...  GRAFANA_CLOUD_LOKI_USER=... \
#          GRAFANA_CLOUD_TOKEN=...
#   ./miuops apply <host>
# The TOKEN must stay env-only (never on disk). The URLs + instance IDs are not secret;
# if you tire of exporting them you may instead set the grafana_cloud_* vars in
# gitignored config (they override these env-lookup defaults). Scope the Access Policy
# to metrics:write + logs:write.
grafana_cloud_prometheus_url:  "{{ lookup('env', 'GRAFANA_CLOUD_PROM_URL')  | default('', true) }}"
grafana_cloud_prometheus_user: "{{ lookup('env', 'GRAFANA_CLOUD_PROM_USER') | default('', true) }}"
grafana_cloud_loki_url:        "{{ lookup('env', 'GRAFANA_CLOUD_LOKI_URL')  | default('', true) }}"
grafana_cloud_loki_user:       "{{ lookup('env', 'GRAFANA_CLOUD_LOKI_USER') | default('', true) }}"
grafana_cloud_token:           "{{ lookup('env', 'GRAFANA_CLOUD_TOKEN')     | default('', true) }}"
