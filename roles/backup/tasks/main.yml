---
# Host-side, stop-consistent Docker volume backup to S3, driven by a systemd
# timer. No-op unless `backup_enabled`. Self-contained: installs its own
# dependencies so a `--tags backup` run works on its own (mirrors the
# observability / cloudflared roles).

# ---- Validate configuration up front -----------------------------------------
- name: Ensure backup destination + credentials are configured
  ansible.builtin.assert:
    that:
      - backup_s3_bucket | length > 0
      - backup_aws_access_key_id | length > 0
      - backup_aws_secret_access_key | length > 0
      - backup_aws_region | length > 0
    fail_msg: >-
      backup_enabled is true but the destination/credentials are incomplete.
      Set backup_s3_bucket (here or in group_vars) + backup_aws_region in
      host_vars (region is config, not secret; default us-west-2), then run
      'miuops backup-setup --server <host>' to mint and write the AWS creds
      into the encrypted <host>.vars.json (see roles/backup/README.md).
    quiet: true
  when: backup_enabled | bool
  tags: ['backup']

- name: Ensure the S3 prefix is rooted at this server's name
  ansible.builtin.assert:
    that:
      - backup_s3_prefix is string
      - backup_s3_prefix.startswith(inventory_hostname ~ '/')
    fail_msg: >-
      backup_s3_prefix ('{{ backup_s3_prefix }}') must start with
      '{{ inventory_hostname }}/' so this host writes only inside its own
      fleet prefix. The per-server backup IAM user is scoped to
      '{{ inventory_hostname }}/*'; a prefix outside it would fail at backup
      time with AccessDenied (a silent 02:00 gap). Set
      backup_s3_prefix: "{{ inventory_hostname }}/vol" (the default).
    quiet: true
  when: backup_enabled | bool
  tags: ['backup']

- name: Validate encryption mode
  ansible.builtin.assert:
    that:
      - backup_encryption in ['none', 'age']
      - backup_age_recipients is sequence and backup_age_recipients is not string
      - not (backup_encryption == 'age' and (backup_age_recipients | length == 0))
      - not (backup_encryption == 'none' and (backup_age_recipients | length > 0))
    fail_msg: >-
      Invalid encryption config. backup_encryption must be one of none|age;
      backup_age_recipients must be a LIST (a bare string is split per-character
      into bogus -r args); 'age' requires backup_age_recipients; recipients set
      with encryption 'none' would upload PLAINTEXT -- set backup_encryption: age,
      or clear backup_age_recipients.
    quiet: true
  when: backup_enabled | bool
  tags: ['backup']

# ---- Dependencies (self-contained) -------------------------------------------
# awscli streams the upload (`aws s3 cp - s3://...`); jq parses the volume list;
# tar is base. age is installed only when that encryption mode is used.
- name: Install backup dependencies (awscli, jq, tar)
  ansible.builtin.apt:
    name:
      - awscli
      - jq
      - tar
    state: present
    update_cache: true
  when: backup_enabled | bool
  tags: ['backup']

- name: Install age (only when encryption=age)
  ansible.builtin.apt:
    name: age
    state: present
    update_cache: true
  when:
    - backup_enabled | bool
    - backup_encryption == 'age'
  tags: ['backup']

# age can encrypt to a YubiKey identity (age1yubikey1...) only via the plugin --
# plain `age` errors "age-plugin-yubikey: executable file not found". Encryption
# needs ONLY the public key, so the host needs no YubiKey (the daily backup stays
# unattended); the key is required only to DECRYPT at restore time, on the
# operator's machine. So we install it here, gated on a YubiKey recipient.
- name: Install age-plugin-yubikey (only for YubiKey recipients)
  when:
    - backup_enabled | bool
    - backup_encryption == 'age'
    - backup_age_recipients | select('match', '^age1yubikey') | list | length > 0
  tags: ['backup']
  vars:
    # miuOps builds the plugin in transparent CI for both arches; the release names binaries by
    # Debian arch (amd64/arm64), so map the kernel arch (x86_64/aarch64) to it.
    _apy_arch: "{{ {'x86_64': 'amd64', 'amd64': 'amd64', 'aarch64': 'arm64', 'arm64': 'arm64'}.get(ansible_facts['architecture'], '') }}"
    _apy_sha: "{{ backup_age_plugin_yubikey_sha256.get(_apy_arch, '') }}"
  block:
    - name: Assert a CI-built age-plugin-yubikey is pinned for this architecture
      ansible.builtin.assert:
        that:
          - _apy_arch in ['amd64', 'arm64']
          - _apy_sha | length == 64
        fail_msg: >-
          A YubiKey backup recipient (age1yubikey1...) needs age-plugin-yubikey. miuOps builds it
          in transparent CI for amd64 + arm64; this host is {{ ansible_facts['architecture'] }}
          (arch '{{ _apy_arch }}'). Pin its sha256 in
          backup_age_plugin_yubikey_sha256['{{ _apy_arch | default('<arch>') }}'].
        quiet: true

    # The CI binary is dynamically linked against libpcsclite.so.1 (the .deb used to pull this
    # in). Without it `age` fails when it invokes the plugin -- i.e. at restore time, the worst
    # moment -- so install it now and verify the plugin runs at deploy time.
    - name: Ensure libpcsclite1 (age-plugin-yubikey's runtime dependency)
      ansible.builtin.apt:
        name: libpcsclite1
        state: present
        update_cache: true

    - name: Install age-plugin-yubikey binary (pinned by sha256) on PATH
      ansible.builtin.get_url:
        url: "https://github.com/{{ backup_age_plugin_yubikey_repo }}/releases/download/age-plugin-yubikey-v{{ backup_age_plugin_yubikey_version }}/age-plugin-yubikey_{{ backup_age_plugin_yubikey_version }}_{{ _apy_arch }}"
        dest: /usr/local/bin/age-plugin-yubikey
        checksum: "sha256:{{ _apy_sha }}"
        owner: root
        group: root
        mode: '0755'

    - name: Verify the plugin runs (fails loudly here at deploy, not at restore time)
      ansible.builtin.command: age-plugin-yubikey --version
      changed_when: false

# ---- Config + secrets --------------------------------------------------------
- name: Create backup config directory
  ansible.builtin.file:
    path: "{{ backup_config_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0700'
  when: backup_enabled | bool
  tags: ['backup']

- name: Deploy AWS credentials env file (sourced by the script; root-only)
  ansible.builtin.template:
    src: backup.env.j2
    dest: "{{ backup_config_dir }}/backup.env"
    owner: root
    group: root
    mode: '0600'
  no_log: true
  when: backup_enabled | bool
  notify: Restart backup timer
  tags: ['backup']

- name: Deploy volume list
  ansible.builtin.template:
    src: volumes.json.j2
    dest: "{{ backup_config_dir }}/volumes.json"
    owner: root
    group: root
    mode: '0600'
  when: backup_enabled | bool
  notify: Restart backup timer
  tags: ['backup']

# ---- Backup script -----------------------------------------------------------
- name: Deploy backup script
  ansible.builtin.template:
    src: miuops-backup.sh.j2
    dest: "{{ backup_script_path }}"
    owner: root
    group: root
    mode: '0700'
  when: backup_enabled | bool
  notify: Restart backup timer
  tags: ['backup']

# ---- systemd service + timer -------------------------------------------------
- name: Deploy backup systemd service
  ansible.builtin.template:
    src: miuops-backup.service.j2
    dest: /etc/systemd/system/miuops-backup.service
    owner: root
    group: root
    mode: '0644'
  when: backup_enabled | bool
  notify:
    - Reload systemd
    - Restart backup timer
  tags: ['backup']

- name: Deploy backup systemd timer
  ansible.builtin.template:
    src: miuops-backup.timer.j2
    dest: /etc/systemd/system/miuops-backup.timer
    owner: root
    group: root
    mode: '0644'
  when: backup_enabled | bool
  notify:
    - Reload systemd
    - Restart backup timer
  tags: ['backup']

- name: Enable + start the backup timer
  ansible.builtin.systemd:
    name: miuops-backup.timer
    enabled: true
    state: started
    daemon_reload: true
  when: backup_enabled | bool
  tags: ['backup']

- name: Flush handlers
  ansible.builtin.meta: flush_handlers
