---
# Host-side, stop-consistent Docker volume backup to S3. Opt-in per host:
# set `backup_enabled: true` in that host's host_vars. The whole role is a
# no-op otherwise.
#
# A host systemd timer runs a bash script that, for each volume in
# `backup_volumes`, stops its containers (for a consistent on-disk snapshot),
# streams a tar of the volume through optional encryption straight to S3, then
# restarts the containers. No container, no docker.sock mount.
backup_enabled: false

# --- What to back up --------------------------------------------------------
# A list of Docker volumes. Each item:
#   name: <docker volume name as shown by `docker volume ls`>
#   stop: [<container names/ids to stop before archiving, restart after>]
# An empty (or omitted) `stop` list takes a HOT copy with the containers still
# running -- only safe for volumes whose writers can tolerate a fuzzy snapshot
# (append-only logs, idempotently-rebuilt caches). For anything stateful
# (databases, queues) list the writing containers so the archive is taken at
# rest. Databases are better served by managed Postgres (or their own backup
# tooling); use this volume backup for the volumes around them.
backup_volumes: []
#   - name: app_uploads
#     stop: [app]
#   - name: caddy_data
#     stop: []

# --- Destination ------------------------------------------------------------
# S3 bucket (name only, no s3:// prefix) and key prefix. ONE bucket is shared by
# the whole fleet; every key is rooted at this server's name so the per-server
# IAM user (scoped to "<server>/*") is authorized to write it. Objects land at
#   s3://<bucket>/<server>/vol/<volume>/backup-<UTC ISO8601>.tar[.age]
# Keep the "<inventory_hostname>/" root if you override this (the role asserts
# it) so a host cannot write outside its own prefix.
backup_s3_bucket: ""
backup_s3_prefix: "{{ inventory_hostname }}/vol"

# --- Schedule ---------------------------------------------------------------
# systemd OnCalendar expression for the timer. Default: daily at ~02:00 local.
# A randomized delay (below) smears the actual start to avoid a thundering herd
# across a fleet and to dodge round-the-hour S3 contention.
backup_schedule: "*-*-* 02:00:00"
backup_randomized_delay_sec: "45m"

# --- Encryption (client-side, before upload) --------------------------------
# One of: none | age. Encrypts the tar stream so a leaked S3 credential
# (or a leaked object) cannot read backup contents.
#   age  -> recipients in `backup_age_recipients` (native age1... keys and/or
#           ssh-ed25519 / ssh-rsa public keys). Output extension: .tar.age
#           age covers hardware/SSH workflows too: it accepts SSH public keys
#           as recipients (restore with the matching SSH private key) and
#           supports age-plugin-yubikey for hardware-backed keys -- see
#           docs/BACKUP_ENCRYPTION.md.
# Asymmetric only by design: the private key never lives on the server, so a
# host compromise does not expose the means to decrypt the backups.
backup_encryption: "none"
backup_age_recipients: []

# When a recipient is a YubiKey identity (age1yubikey1...), the host needs
# age-plugin-yubikey -- plain `age` cannot wrap a key for a plugin recipient
# without it. The role installs it automatically in that case. Encryption uses
# only the public key, so NO YubiKey is needed on the server (the daily backup
# runs unattended); the YubiKey is required only to DECRYPT at restore time, on
# the operator's machine. The binary is built in transparent CI for amd64 + arm64
# (.github/workflows/build-age-plugin-yubikey.yml) and installed on PATH, pinned by sha256
# below. A version bump must update the version + BOTH per-arch shas together.
backup_age_plugin_yubikey_version: "0.5.0"
backup_age_plugin_yubikey_repo: "tianshanghong/miuops"
# Per-arch sha256 of the CI-built binary, from the `age-plugin-yubikey-v<version>` release.
# Pin after dispatching the build workflow; read each from the published `.sha256` sidecar
# (e.g. `gh release download age-plugin-yubikey-v0.5.0 -R tianshanghong/miuops -p '*.sha256' -D -`).
backup_age_plugin_yubikey_sha256:
  amd64: ""   # TODO: pin from the CI release (see above)
  arm64: ""   # TODO: pin from the CI release (see above)

# --- AWS credentials --------------------------------------------------------
# config/secret split. The ACCESS KEY + SECRET are SECRETS: `miuops backup-setup`
# writes them SOPS-encrypted to fleet/secrets/<host>.vars.json, and `miuops apply`
# decrypts them at converge and supplies them as extra-vars (which outrank these
# env-lookup defaults -- the bare AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY export is
# the fallback). They render into /etc/miuops-backup/backup.env (0600, root); the
# script sources that file, so credentials never appear in argv / `ps` output.
backup_aws_access_key_id: "{{ lookup('env', 'AWS_ACCESS_KEY_ID') | default('', true) }}"
backup_aws_secret_access_key: "{{ lookup('env', 'AWS_SECRET_ACCESS_KEY') | default('', true) }}"
# The REGION is CONFIG (not secret): set backup_aws_region in host_vars; it never touches
# the environment (defaults to us-west-2).
backup_aws_region: "us-west-2"

# Optional S3-compatible endpoint override (e.g. for non-AWS object stores).
# Leave empty for AWS S3. When set, passed to the AWS CLI as --endpoint-url.
backup_s3_endpoint_url: ""

# --- Internal paths (override only if you must) -----------------------------
backup_config_dir: "/etc/miuops-backup"
backup_script_path: "/usr/local/bin/miuops-backup"
